<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darshan Visuals Infinity</title>
<link rel="stylesheet" href="styles.css">
<script type="module" src="script.js"></script>
</head>
<body>

<div id="loader">
  <h1>DARSHAN VISUALS</h1>
</div>

<div id="canvas-container"></div>
<div class="grain"></div>
<div class="cursor-glow"></div>

<header>
  <div class="logo">DARSHAN VISUALS</div>

  <nav>
    <a href="#">HOME</a>
    <a href="#">REELS</a>
    <a href="#">SERVICES</a>
    <a href="#">CONTACT</a>
  </nav>
</header>

<section class="hero">

<div class="hero-content">
<p class="tag">CGI • VFX • SFX EXPERIENCE</p>

<h1>IMMERSIVE CINEMATIC STORIES</h1>

<p class="sub">
FUTURISTIC VISUAL STORYTELLING EXPERIENCE
</p>

<button>ENTER EXPERIENCE</button>
</div>

</section>

<section class="reels-section">

<h2>Featured Reels</h2>

<div class="reels-grid">

<div class="reel-card">
<video muted loop>
<source src="cinematic.mp4" type="video/mp4">
</video>
<div class="overlay">Cinematic Reel</div>
</div>

<div class="reel-card">
<video muted loop>
<source src="concert.mp4" type="video/mp4">
</video>
<div class="overlay">Concert Edit</div>
</div>

<div class="reel-card">
<video muted loop>
<source src="travel.mp4" type="video/mp4">
</video>
<div class="overlay">Travel Film</div>
</div>

<div class="reel-card">
<video muted loop>
<source src="wedding.mp4" type="video/mp4">
</video>
<div class="overlay">Wedding Story</div>
</div>

</div>

</section>

<footer>
DARSHAN VISUALS © 2026
</footer>

</body>
</html>
